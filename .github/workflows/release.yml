# GitHub Actions workflow for FFT Offensive Chemist
# Builds and publishes the Reloaded-II mod (data tables + nxd name overrides + icons).
# Mirrors the sibling FFT mods' release pipeline, scoped to this data-only mod.
#
# Produces:
#   - Build artifacts for testing (on every push)
#   - GitHub Release (on tag push: vX.Y.Z)
#   - Automatic changelog generation

name: Build and Publish FFT Offensive Chemist

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PUBLISH_PATH: ./Publish
  PUBLISH_CHANGELOG_PATH: ./Publish/Changelog.md
  PYTHONUTF8: "1"
  IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # Need write permission to create releases
    defaults:
      run:
        shell: pwsh

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for changelog

    - name: Setup Python (for the data gate + table generation)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup Node.js (for changelog)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Changelog Generator
      run: npm install -g auto-changelog

    - name: Generate Changelog
      run: |
        [System.IO.Directory]::CreateDirectory("$env:PUBLISH_PATH")
        if ($env:IS_RELEASE -eq 'true') {
            auto-changelog --sort-commits date --hide-credit --template keepachangelog --commit-limit false --starting-version "$env:RELEASE_TAG" --output "$env:PUBLISH_CHANGELOG_PATH"
        }
        else {
            auto-changelog --sort-commits date --hide-credit --template keepachangelog --commit-limit false --unreleased --output "$env:PUBLISH_CHANGELOG_PATH"
        }

    # THE GATE: gate.py exits 1 on any malformed grenade definition. A red gate
    # here means the design source regressed and the release must not ship.
    - name: Data Gate (gate.py)
      run: python tools/gate.py

    # Runs the gated pipeline (gate -> generate) inside Publish.ps1, then stages,
    # zips, and verifies the package. The committed item.en.nxd / ability.en.nxd
    # ship as-is (their FF16Tools rebuild is a local-only step).
    - name: Build and Package
      id: publish
      run: ./Publish.ps1

    # Independent assertion. Fails loud (workflow goes red) if the zip is missing,
    # empty, or doesn't contain the core data tables.
    - name: Verify Release Artifact
      run: |
        $zipName = '${{ steps.publish.outputs.zip }}'
        if (-not $zipName) { throw "Publish.ps1 did not emit a 'zip' output." }
        if (-not (Test-Path $zipName)) { throw "Expected zip not found: $zipName" }
        $sizeKB = [math]::Round((Get-Item $zipName).Length / 1KB, 2)
        if ($sizeKB -lt 30) { throw "Zip suspiciously small ($sizeKB KB); data package (xml/nxd/tex) should be larger" }
        Add-Type -Assembly System.IO.Compression.FileSystem
        $z = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zipName))
        $hasConsumable = $z.Entries | Where-Object { $_.Name -eq 'ItemConsumableData.xml' } | Select-Object -First 1
        $hasItemNxd    = $z.Entries | Where-Object { $_.Name -eq 'item.en.nxd' } | Select-Object -First 1
        $hasAbilityNxd = $z.Entries | Where-Object { $_.Name -eq 'ability.en.nxd' } | Select-Object -First 1
        $z.Dispose()
        if (-not $hasConsumable) { throw "ItemConsumableData.xml missing from $zipName" }
        if (-not $hasItemNxd)    { throw "item.en.nxd missing from $zipName" }
        if (-not $hasAbilityNxd) { throw "ability.en.nxd missing from $zipName" }
        Write-Host "OK: $zipName ($sizeKB KB) contains ItemConsumableData.xml + item.en.nxd + ability.en.nxd"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FFTOffensiveChemist-${{ github.sha }}
        path: ${{ steps.publish.outputs.zip }}
        retention-days: 30

    - name: Upload Changelog
      uses: actions/upload-artifact@v4
      with:
        name: Changelog
        path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        retention-days: 30

    - name: Create GitHub Release (on Tag)
      uses: softprops/action-gh-release@v2
      if: env.IS_RELEASE == 'true'
      with:
        name: FFT Offensive Chemist ${{ env.RELEASE_TAG }}
        body_path: ${{ env.PUBLISH_CHANGELOG_PATH }}
        files: ${{ steps.publish.outputs.zip }}
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
